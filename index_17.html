<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Async Weather Tracker</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: linear-gradient(135deg, #68e2f5, #58c8eb);
    color: rgb(14, 13, 13);
    padding: 40px;
}

h1 {
    text-align: center;
    margin-bottom: 30px;
}

.main-container {
    max-width: 900px;
    margin: auto;
}

.top-section {
    display: flex;
    gap: 20px;
}

.card {
    background: #e4e0e0;
    color: rgb(7, 7, 7);
    border-radius: 15px;
    padding: 25px;
    flex: 1;
}

.card h3 {
    margin-bottom: 15px;
}

input {
    padding: 8px;
    width: 70%;
}

button {
    padding: 8px 12px;
    background: #1651b7;
    border: none;
    color: rgb(241, 234, 234);
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #e85a2a;
}

.history-item {
    background: #ff6b35;
    color: white;
    padding: 5px 10px;
    border-radius: 15px;
    display: inline-block;
    margin: 5px 5px 0 0;
    cursor: pointer;
    font-size: 14px;
}

.console-box {
    background: #0f1b52;
    color: white;
    margin-top: 20px;
    padding: 15px;
    border-radius: 10px;
    font-size: 14px;
}

#error {
    color: red;
    margin-top: 10px;
}

</style>
</head>

<body>

<h1>🌤 Async Weather Tracker</h1>

<div class="main-container">

    <div class="top-section">

        <div class="card">
            <h3>🌃Search City</h3>
            <hr>
            <input type="text" id="cityInput" placeholder="Delhi, London...">
            <button id="searchBtn">Search</button>

            <h3 style="margin-top:20px;">Search History</h3>
            <div id="history"></div>
        </div>

        <div class="card">
            <h3>🌤️Weather Info</h3>
            <hr>
            <div id="weatherResult">No data yet</div>
            <div id="error"></div>
        </div>

    </div>

    <div class="console-box">
        <h3>Console – Event Loop</h3>
        <div id="consoleOutput"></div>
    </div>

</div>

<script>

const API_KEY = "YOUR_API_KEY_HERE";
const defaultCities = ["Delhi", "Jaipur", "Mumbai", "Gurugram"];

const cityInput = document.getElementById("cityInput");
const searchBtn = document.getElementById("searchBtn");
const weatherResult = document.getElementById("weatherResult");
const historyDiv = document.getElementById("history");
const errorDiv = document.getElementById("error");
const consoleOutput = document.getElementById("consoleOutput");

function log(message) {
    console.log(message);
    consoleOutput.innerHTML += message + "<br>";
}

window.onload = () => {
    log("Sync Start");
    if (!localStorage.getItem("cities")) {
        localStorage.setItem("cities", JSON.stringify(defaultCities));
    }
    loadHistory();
    log("Sync End");
};

async function fetchWeather(city) {

    errorDiv.textContent = "";
    weatherResult.textContent = "Loading...";
    log("Async Start fetching");

    try {
        const response = await fetch(
            `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`
        );

        if (!response.ok) {
            throw new Error("City not found");
        }

        const data = await response.json();

        weatherResult.innerHTML = `
            <p><strong>City:</strong> ${data.name}</p>
            <p><strong>Temperature:</strong> ${data.main.temp} °C</p>
            <p><strong>Condition:</strong> ${data.weather[0].description}</p>
        `;

        saveCity(city);
        log("Promise.then (Microtask)");

        setTimeout(() => {
            log("setTimeout (Macrotask)");
        }, 0);

    } catch (err) {
        errorDiv.textContent = err.message;
    }
}

function saveCity(city) {
    let cities = JSON.parse(localStorage.getItem("cities")) || [];
    if (!cities.includes(city)) {
        cities.push(city);
        localStorage.setItem("cities", JSON.stringify(cities));
    }
    loadHistory();
}

function loadHistory() {
    historyDiv.innerHTML = "";
    let cities = JSON.parse(localStorage.getItem("cities")) || [];
    cities.forEach(city => {
        let span = document.createElement("span");
        span.textContent = city;
        span.classList.add("history-item");
        span.onclick = () => fetchWeather(city);
        historyDiv.appendChild(span);
    });
}

searchBtn.addEventListener("click", () => {
    let city = cityInput.value.trim();
    if (city === "") {
        errorDiv.textContent = "Enter city name";
        return;
    }
    fetchWeather(city);
});

</script>

</body>
</html>
