<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Event Dashboard</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #8f8f92, #8e8e90);
        margin: 0;
        padding: 20px;
    }

    h1 {
        text-align: center;
        color: rgb(0, 0, 0);
    }

    .container {
        display: flex;
        justify-content: center;
        gap: 50px;
        margin-top: 50px;
    }

    .card {
        background: #f2f2f2;
        padding: 20px;
        border-radius: 10px;
        width: 320px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .card h2 {
        color: #3d5a80;
        margin-top: 0;
    }

    input, select, textarea {
        width: 100%;
        padding: 8px;
        margin: 5px 0 10px;
        border-radius: 5px;
        border: 1px solid #ccc;
    }

    textarea {
        height: 60px;
    } c

    button {
        background: #4fb3c8;
        color: white;
        border: none;
        padding: 10px;
        width: 100%;
        border-radius: 6px;
        cursor: pointer;
    }

    button:hover {
        background: #3499ad;
    }

    .btn-row {
        display: flex;
        gap: 10px;
        margin-bottom: 10px;
    }

    .btn-row button {
        width: 50%;
    }

    #eventList {
        list-style: none;
        padding: 0;
    }

    #eventList li {
        background: white;
        margin-bottom: 8px;
        padding: 8px;
        border-radius: 5px;
    }

    .empty {
        color: gray;
    }

    .bottom {
        width: 680px;
        margin: 20px auto;
    }
</style>
</head>

<body>

<h1>🫆 Smart Event Dashboard</h1>

<div class="container">

    <div class="card">
        <h2>Add New Event</h2>

        <label>Event Title:</label>
        <input type="text" id="title">

        <label>Event Date:</label>
        <input type="date" id="date">

        <label>Category:</label>
        <select id="category">
            <option>Conference</option>
            <option>Workshop</option>
            <option>Meeting</option>
            <option>Personal</option>
        </select>

        <label>Description:</label>
        <textarea id="desc"></textarea>

        <button onclick="addEvent()">Add Event</button>
    </div>

    <div class="card">
        <h2>My Events</h2>

        <div class="btn-row">
            <button onclick="clearEvents()">Clear All Events</button>
            <button onclick="addSample()">Add Sample Events</button>
        </div>

        <ul id="eventList">
            <p class="empty">No events yet. Add your first event!</p>
        </ul>
    </div>

</div>

<div class="card bottom">
    <h2>DOM Manipulation Demo</h2>
    <p id="keyText">You Pressed: None</p>
</div>

<script>
    let events = [];

    function renderEvents() {
        let list = document.getElementById("eventList");
        list.innerHTML = "";

        if (events.length === 0) {
            list.innerHTML = "<p class='empty'>No events yet. Add your first event!</p>";
            return;
        }

        events.forEach(function(e) {
            let li = document.createElement("li");
            li.innerHTML = "<b>" + e.title + "</b> (" + e.date + ") <br> " + e.category + " - " + e.desc;
            list.appendChild(li);
        });
    }

    function addEvent() {
        let title = document.getElementById("title").value;
        let date = document.getElementById("date").value;
        let category = document.getElementById("category").value;
        let desc = document.getElementById("desc").value;

        if (title === "" || date === "") {
            alert("Please fill required fields");
            return;
        }

        events.push({
            title: title,
            date: date,
            category: category,
            desc: desc
        });

        renderEvents();

        document.getElementById("title").value = "";
        document.getElementById("date").value = "";
        document.getElementById("desc").value = "";
    }

    function clearEvents() {
        events = [];
        renderEvents();
    }

    function addSample() {
        events.push(
            { title: "AI Workshop", date: "2026-03-10", category: "Workshop", desc: "ML basics session" },
            { title: "Team Meeting", date: "2026-03-15", category: "Meeting", desc: "Project discussion" }
        );
        renderEvents();
    }

    document.addEventListener("keydown", function(event) {
        document.getElementById("keyText").innerText = "You Pressed: " + event.key;
    });
</script>

</body>
</html>
